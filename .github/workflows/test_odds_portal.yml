name: Test Odds Scraping

on:
  workflow_dispatch:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r setup/requirements-scrape.txt
          scrapling install

      - name: Run odds scraping test
        run: |
          python bet_crawler/test_odds_scraping.py "https://www.oddsportal.com/football/h2h/aston-villa-W00wmLO0/tottenham-UDg08Ohm/"
          # Create artifacts directory if it doesn't exist
          mkdir -p html_artifacts
          # Copy any HTML files that were saved to the artifacts directory
          cp -r bet_crawler/html_artifacts/* html_artifacts/ 2>/dev/null || true
  
      - name: Upload HTML artifacts
        uses: actions/upload-artifact@v4
        if: always()  # Upload artifacts even if the test fails
        with:
          name: scraped-page-html
          path: html_artifacts/