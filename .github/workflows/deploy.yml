name: Build and Publish Dashboard Image

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — bet-assistant
        uses: docker/build-push-action@v5
        with:
          context: .
          file: setup/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/bet-assistant:latest
          provenance: false
          cache-from: type=gha,scope=bet-assistant
          cache-to:   type=gha,mode=max,scope=bet-assistant

      - name: Build and push — runner
        uses: docker/build-push-action@v5
        with:
          context: .
          file: setup/runner.Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/bet-assistant-runner:latest
          provenance: false
          cache-from: type=gha,scope=runner
          cache-to:   type=gha,mode=max,scope=runner
