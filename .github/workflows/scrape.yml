name: Matches Scraper

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

env:
  SCRAPE_KIT_LOG_LEVEL: INFO
  LOCAL_RUNNER: "self-hosted, linux, bet-runner"

jobs:
  # ── 1. PREPARE (cloud) ─────────────────────────────────────────────────────
  prepare-actions:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Initialize log file
        run: |
          echo "=== Job: prepare-actions started at $(date) ===" > job_log.txt

      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --no-cache-dir -r setup/requirements-scrape.txt 2>&1 | tee -a job_log.txt
          scrapling install 2>&1 | tee -a job_log.txt

      - name: Generate Matrix
        id: set-matrix
        run: |
          set -o pipefail
          JSON_DATA=$(./venv/bin/python -m bet_crawler.crawl --mode prepare-scrape --runners actions --config_dir "config" 2> stderr.log)
          cat stderr.log >> job_log.txt

          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "{\"include\":$JSON_DATA}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload URL files
        uses: actions/upload-artifact@v4
        with:
          name: url-files-actions
          path: "*-urls.txt"
          retention-days: 1

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-prepare-actions
          path: job_log.txt
          retention-days: 7

  # ── 2. PREPARE (local / self-hosted) ──────────────────────────────────────
  prepare-local:
    runs-on: [self-hosted, linux, bet-runner]
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Initialize log file
        run: |
          echo "=== Job: prepare-local started at $(date) ===" > job_log.txt

      - name: Check for Scrape-Kit Updates
        id: check-git
        run: |
          # 1. Fetch the latest commit hash from the remote repository metadata instantly
          REMOTE_SHA=$(git ls-remote https://github.com/rotarurazvan07/scrape-kit.git refs/heads/main | awk '{print $1}')
          echo "Remote SHA: $REMOTE_SHA"

          # 2. Check what version is currently available locally in site-packages
          LOCAL_SHA=$(python3 -c "
            try:
                import pkg_resources
                dist = pkg_resources.get_distribution('scrape-kit')
                print(dist.version)
            except Exception:
                print('')
            " 2>/dev/null || true)
                    echo "Local Version/SHA: $LOCAL_SHA"

          # Force an update if hashes don't match, or if it isn't installed yet
          if [ -z "$LOCAL_SHA" ] || [[ "$LOCAL_SHA" != *"$REMOTE_SHA"* ]]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "🔄 Remote changed or package missing. Update triggered."
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "✅ Up to date with remote main branch. Skipping install."
          fi

      - name: Refresh scrape-kit via Pip
        if: steps.check-git.outputs.needs_update == 'true'
        run: |
          python3 -m pip install --user --upgrade pip setuptools wheel 2>&1 | tee -a job_log.txt
          python3 -m pip install --user --upgrade --force-reinstall \
            "git+https://github.com/rotarurazvan07/scrape-kit.git@main#egg=scrape-kit" 2>&1 | tee -a job_log.txt

      - name: Generate Matrix
        id: set-matrix
        env:
          PYTHONPATH: /home/runner/work/bet-assistant/bet-assistant:/home/runner/.local/lib/python3.10/site-packages
        run: |
          set -o pipefail
          if ! JSON_DATA=$(python3 -m bet_crawler.crawl --mode prepare-scrape --runners local --config_dir "config" 2> stderr.log); then
            echo "❌ Python script crashed! Printing stderr configurations:" >&2
            cat stderr.log >&2
            exit 1
          fi
          cat stderr.log >> job_log.txt

          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "{\"include\":$JSON_DATA}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload URL files
        uses: actions/upload-artifact@v4
        with:
          name: url-files-local
          path: "*-urls.txt"
          retention-days: 1

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-prepare-local
          path: job_log.txt
          retention-days: 7

  # ── 3. SCRAPE (cloud) ──────────────────────────────────────────────────────
  scrape-actions:
    needs: prepare-actions
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-actions.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Initialize log file
        run: |
          echo "=== Job: scrape-actions started at $(date) ===" > job_log.txt

      - name: Install dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --no-cache-dir -r setup/requirements-scrape.txt 2>&1 | tee -a job_log.txt
          scrapling install 2>&1 | tee -a job_log.txt

      - name: Download URL files
        uses: actions/download-artifact@v4
        with:
          name: url-files-actions

      - name: Run Scraper
        run: |
          set -o pipefail
          ./venv/bin/python -m bet_crawler.crawl \
            --mode scrape \
            --matches_db_path "${{ matrix.db_path }}" \
            --urls "${{ matrix.urls_file }}" \
            --config_dir "config" \
            2>&1 | tee -a job_log.txt

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.db_path }}
          path: ${{ matrix.db_path }}
          retention-days: 7

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-scrape-actions-${{ matrix.db_path }}
          path: job_log.txt
          retention-days: 7

  # ── 4. SCRAPE (local / self-hosted) ───────────────────────────────────────
  scrape-local:
    needs: prepare-local
    runs-on: [self-hosted, linux, bet-runner]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-local.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Initialize log file
        run: |
          echo "=== Job: scrape-local started at $(date) ===" > job_log.txt

      - name: Check for Scrape-Kit Updates
        id: check-git
        run: |
          REMOTE_SHA=$(git ls-remote https://github.com/rotarurazvan07/scrape-kit.git refs/heads/main | awk '{print $1}')
          LOCAL_SHA=$(python3 -c "
            try:
                import pkg_resources
                dist = pkg_resources.get_distribution('scrape-kit')
                print(dist.version)
            except Exception:
                print('')
            " 2>/dev/null || true)
          if [ -z "$LOCAL_SHA" ] || [[ "$LOCAL_SHA" != *"$REMOTE_SHA"* ]]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Refresh scrape-kit via Pip
        if: steps.check-git.outputs.needs_update == 'true'
        run: |
          python3 -m pip install --user --upgrade pip setuptools wheel 2>&1 | tee -a job_log.txt
          python3 -m pip install --user --upgrade --force-reinstall \
            "git+https://github.com/rotarurazvan07/scrape-kit.git@main#egg=scrape-kit" 2>&1 | tee -a job_log.txt

      - name: Download URL files
        uses: actions/download-artifact@v4
        with:
          name: url-files-local

      - name: Run Scraper
        env:
          PYTHONPATH: /home/runner/work/bet-assistant/bet-assistant:/home/runner/.local/lib/python3.10/site-packages
        run: |
          set -o pipefail
          python3 -m bet_crawler.crawl \
            --mode scrape \
            --matches_db_path "${{ matrix.db_path }}" \
            --urls "${{ matrix.urls_file }}" \
            --config_dir "config" \
            2>&1 | tee -a job_log.txt

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.db_path }}
          path: ${{ matrix.db_path }}
          retention-days: 7

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-scrape-local-${{ matrix.db_path }}
          path: job_log.txt
          retention-days: 7

  # ── 5. MERGE ───────────────────────────────────────────────────────────────
  merge:
    needs: [scrape-local, scrape-actions]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Initialize log file
        run: |
          echo "=== Job: merge started at $(date) ===" > job_log.txt

      - name: Download all chunks
        uses: actions/download-artifact@v4
        with:
          pattern: "chunk-*.db"
          merge-multiple: true
          path: .

      - name: Install dependencies
        run: pip install --no-cache-dir -r setup/requirements-scrape.txt 2>&1 | tee -a job_log.txt

      - name: Merge Databases
        run: |
          set -o pipefail
          python3 -m bet_crawler.crawl \
            --mode merge \
            --chunks_dir "." \
            --matches_db_path "final_matches.db" \
            --config_dir "config" \
            2>&1 | tee -a job_log.txt

      - name: Upload Final Database
        uses: actions/upload-artifact@v4
        with:
          name: final_matches.db
          path: final_matches.db
          retention-days: 7

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-merge
          path: job_log.txt
          retention-days: 7

  # ── 6. RELEASE ─────────────────────────────────────────────────────────────
  upload-release:
    needs: merge
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download database
        uses: actions/download-artifact@v4
        with:
          name: final_matches.db

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-db
          name: Latest Matches Database
          files: final_matches.db
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 7. UNIFY LOGS ──────────────────────────────────────────────────────────
  unify-logs:
    needs: [prepare-actions, scrape-actions, prepare-local, scrape-local, merge]
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: Download All Logs
        uses: actions/download-artifact@v4
        with:
          pattern: logs-*
          path: all_logs

      - name: Create unified log
        run: |
          echo "=== UNIFIED LOGS FROM ALL JOBS ===" > unified_log.txt
          echo "" >> unified_log.txt
          find all_logs -type f | sort | while read log_file; do
            echo "=== LOG FILE: $(basename "$log_file") ===" >> unified_log.txt
            cat "$log_file"                                   >> unified_log.txt
            echo ""                                           >> unified_log.txt
            echo "=== END OF FILE ==="                         >> unified_log.txt
            echo ""                                           >> unified_log.txt
          done

      - name: Upload unified log
        uses: actions/upload-artifact@v4
        with:
          name: unified-logs
          path: unified_log.txt
          retention-days: 30

  # ── 8. CLEANUP ─────────────────────────────────────────────────────────────
  cleanup-artifacts:
    needs: [unify-logs]
    runs-on: ubuntu-22.04
    if: always()
    permissions:
      actions: write
    steps:
      - name: Delete intermediate artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            logs-*
            url-files-*
            chunk-*
          failOnError: false