weak_tokens:
  # Geographic articles / connectives (also handled partly via acronyms)
  - de
  - do
  - del
  - el
  - al

  # Location words shared across multiple clubs in the same region
  # These cannot discriminate on their own – the qualifier (city/united/…) does.
  - new
  - york
  - los
  - angeles
  - san
  - las
  - east
  - west
  - north
  - south

  # Franchise words that appear across many different clubs.
  # "manchester" is weak because both Man City and Man United carry it;
  # "city" and "united" are NOT listed here – they ARE the discriminative part.
  - manchester
  - inter
  - dynamo
  - real
  - racing
  # "sporting" is stripped by the acronym rule above, so listing it here is
  # redundant but harmless as a safety net for sources that skip the prefix.
  - sporting

# ── Why "city", "united", "union" are intentionally ABSENT from weak_tokens ──
#
#   Those tokens are discriminative qualifiers:
#     • "Manchester City"   strong = {city}
#     • "Manchester United" strong = {united}
#   Because "manchester" is weak, the strong sets are disjoint → strong-token
#   enforcement caps the score → they never merge.  Correct behaviour.
#
#   If you added "city" / "united" to weak_tokens BOTH names would have empty
#   strong sets, enforcement would never fire, and the raw fuzzy scores (~63-70)
#   might cross the threshold – exactly the bug you were hitting.

weights:
  token: 0.40          # best of token_set_ratio / token_sort_ratio
  substr: 0.10         # full-word shared-token bonus
  phonetic: 0.10       # Soundex similarity across strong tokens
  ratio: 0.30          # character-level Levenshtein ratio
  partial: 0.10        # partial_ratio, only applied for short strings (≤ 8 chars)
  strong_mismatch_cap: 35.0   # score ceiling when strong tokens are disjoint

#TEST

# The cap (35) sits comfortably below threshold (65), so disjoint-strong pairs
# never merge.  Raise it slightly (e.g. 45) only if you see legitimate matches
# being blocked; lower it (e.g. 25) to tighten the guard further.
threshold: 65