name: bet-assistant-dashboard

# ── Extension Templates ──────────────────────────────────────────────────────
x-runner-base: &runner-base
  image: ghcr.io/rotarurazvan07/bet-assistant-runner:latest
  restart: unless-stopped
  environment:
    GITHUB_OWNER: "${GITHUB_OWNER}"
    GITHUB_REPO: "${GITHUB_REPO}"
    ACCESS_TOKEN: "${ACCESS_TOKEN}"
    RUNNER_NAME_PREFIX: "bet-runner"
    LABELS: "${RUNNER_LABELS:-self-hosted,linux,bet-runner}"
  labels:
    - "com.centurylinklabs.watchtower.enable=true"
    - "com.centurylinklabs.watchtower.scope=bet-stack"

# ── Services Matrix ─────────────────────────────────────────────────────────
services:
  backend:
    image: ghcr.io/rotarurazvan07/bet-assistant-backend:latest
    container_name: bet-backend
    restart: unless-stopped
    environment:
      - MATCHES_DB_PATH=/app/workspace/data/matches.db
      - SLIPS_DB_PATH=/app/workspace/data/slips.db
      - CONFIG_PATH=/app/workspace/config
      - PYTHONPATH=/app
      - TZ=Europe/Bucharest
    command: >
      sh -c "mkdir -p /app/workspace/config &&
             mkdir -p /app/workspace/data &&
             cp -r /app/config/. /app/workspace/config/ &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./workspace:/app/workspace
    ports:
      - "8000:8000"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=bet-stack"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: ghcr.io/rotarurazvan07/bet-assistant-frontend:latest
    container_name: bet-frontend
    restart: unless-stopped
    ports:
      - "3002:80"
    environment:
      - TZ=Europe/Bucharest
    volumes:
      - ./workspace:/app/workspace
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=bet-stack"

  # ── GITHUB ACTIONS SELF-HOSTED RUNNERS ────────────────────────────────────
  runner:
    <<: *runner-base
    deploy:
      replicas: 1

  # ── AUTOMATED INFRASTRUCTURE DEPLOYER ─────────────────────────────────────
  bet-updater:
    image: containrrr/watchtower:1.7.1
    container_name: bet-updater
    restart: always
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --scope bet-stack --label-enable