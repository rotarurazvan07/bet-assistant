services:
  bet-dashboard:
    image: ghcr.io/rotarurazvan07/bet-assistant:latest
    container_name: bet-dashboard
    restart: always
    environment:
      - REPO=rotarurazvan07/bet-assistant
    command: python -m dashboard.app --matches_db_path /app/data/final_matches.db --slips_db_path /app/data/slips.db --config_path /app/config --no-debug
    ports:
      - "8050:8050"
    volumes:
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=bet-stack"

  bet-updater:
    image: containrrr/watchtower:1.7.1
    platform: linux/arm64
    container_name: bet-updater
    restart: always
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/fir3w4ll/.docker/config.json:/config.json:ro
    command: --interval 300 --cleanup --scope bet-stack